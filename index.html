<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | EggRoom</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #000;
    font-family: Arial, sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px 0 20px;
    box-sizing: border-box;
    overflow: visible;
  }

  #unity-container {
    position: relative !important;
    /* 修正 1：將 100vw 改為 100%，避免捲軸寬度導致畫面無法置中 */
    width: min(calc(100% - 24px), calc((100vh - 32px) * 16 / 9));
    width: min(calc(100% - 24px), calc((100dvh - 32px) * 16 / 9));
    aspect-ratio: 16 / 9;
    height: auto !important;
    margin: auto; /* 確保上下左右皆由 flex 完美置中 */
    background: #000;
    overflow: hidden;
  }

  #unity-canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    background: #000;
    touch-action: manipulation;
  }

  #unity-loading-bar {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: min(80%, 400px);
    display: none;
  }

  #unity-warning {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    z-index: 30;
    width: calc(100% - 20px);
    max-width: 600px;
  }

  #unity-footer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 25;
  }

  #ending-video-overlay {
    position: absolute;
    left: 6%;
    top: 23%;
    width: 28%;
    height: 30%;
    z-index: 999999;
    display: none;
    opacity: 0;
    visibility: hidden;
    overflow: hidden;
    pointer-events: auto;
    transition: opacity 0.35s ease;
    background: transparent;
    border: 0;
    box-sizing: border-box;
  }

  #ending-video-overlay.visible {
    display: block !important;
    opacity: 1 !important;
    visibility: visible !important;
  }

  #ending-video-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  @media (max-width: 1024px) {
    html, body {
      overflow-y: auto !important;
      height: auto !important;
      display: block !important;
    }

    #stage {
      min-height: 100vh;
      min-height: 100dvh;
      /* 補上這三行！強制鎖定 Flexbox 水平與垂直置中 */
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      
      padding: 20px 0 28px !important; 
    }

    #unity-container,
    .unity-mobile {
      position: relative !important;
      
      /* 自適應寬高解法  */
      /* 寬度最大為 100%，但如果螢幕太寬，則用高度反推寬度 (100vh * 16/9) */
      width: 100% !important;
      max-width: calc(100vh * (16 / 9)) !important; 
      aspect-ratio: 16 / 9 !important;
      
      /* 高度讓 aspect-ratio 自動推算 */
      height: auto !important;
      max-height: 100vh !important;

      margin: auto !important; /* Flexbox 完美置中 */
      background: #000 !important;
      overflow: hidden !important;
    }

    #unity-canvas,
    canvas.unity-mobile {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      transform: none !important; 
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    #unity-footer {
      display: none !important;
    }
  }
</style>
  </head>

  <body>
    <div id="youtubeOverlay">
      <div id="youtubePanel">
        <iframe
          id="youtubeFrame"
          src=""
          frameborder="0"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>

        <button
          id="youtubeClose"
          onclick="
            document.getElementById('youtubeFrame').src='';
            document.getElementById('youtubeOverlay').style.display='none';
          "
        >✕</button>
      </div>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">EggRoom</div>
      </div>
    </div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning") div.style = "background: yellow; padding: 10px;";
          setTimeout(function () {
            if (warningBanner.contains(div)) warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data.unityweb",
        frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
        codeUrl: buildUrl + "/Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "EggRoom",
        productVersion: "0.1",
        showBanner: unityShowBanner,
        matchWebGLToCanvasSize: true
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
