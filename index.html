<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Unity WebGL Player | EggRoom</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100dvh;
      background: #000;
    }

    #stage {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0 20px;
      box-sizing: border-box;
    }

    #unity-container {
      position: relative !important;
      width: min(calc(100% - 24px), calc((100dvh - 32px) * 16 / 9));
      aspect-ratio: 16 / 9;
      height: auto !important;
      margin: auto;
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      touch-action: manipulation;
    }

    /* YouTube 視窗樣式 */
    #ending-video-overlay {
      position: absolute;
      left: 6%;  /* 桌機版位置 */
      top: 23%;
      width: 28%;
      height: 30%;
      z-index: 999999;
      display: none;
      opacity: 0;
      visibility: hidden;
      background: #000;
      transition: opacity 0.35s ease;
      overflow: hidden;
    }

    #ending-video-overlay.visible {
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
    }

    #ending-video-frame {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* 手機版適配 (螢幕寬度小於 1024px) */
    @media (max-width: 1024px) {
      #stage {
        padding: 20px 0 28px !important;
      }

      #unity-container {
        width: 90% !important; /* 稍微放大寬度 */
      }

      /* 手機版影片視窗放大，不然 28% 會太小 */
      #ending-video-overlay {
        left: 5% !important;
        top: 10% !important;
        width: 90% !important;
        height: 80% !important;
      }
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: min(80%, 400px);
      display: none;
    }

    #unity-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 30;
      width: calc(100% - 20px);
      max-width: 600px;
    }
  </style>
</head>

<body>
<div id="stage">
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="ending-video-overlay">
      <iframe 
        id="ending-video-frame" 
        src="" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
      </iframe>
    </div>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-build-title">EggRoom</div>
      <div id="unity-fullscreen-button"></div>
    </div>
  </div>
</div>

<script>
  const stage = document.querySelector("#stage");
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");
  const fullscreenButton = document.querySelector("#unity-fullscreen-button");

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/0427.loader.js";
  const config = {
    dataUrl: buildUrl + "/0427.data.unityweb",
    frameworkUrl: buildUrl + "/0427.framework.js.unityweb",
    codeUrl: buildUrl + "/0427.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "EggRoom",
    productVersion: "0.1",
  };

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {
      loadingBar.style.display = "none";
      fullscreenButton.onclick = () => {
        if (stage.requestFullscreen) stage.requestFullscreen();
        else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
      };
    }).catch((message) => alert(message));
  };
  document.body.appendChild(script);

  // --- YouTube 控制函式 ---
  window.ShowYoutubeVideo = function (videoId) {
    const overlay = document.getElementById("ending-video-overlay");
    const iframe = document.getElementById("ending-video-frame");

    if (!overlay || !iframe) return;

    // 先清空避免舊影片殘留聲音
    iframe.src = "";
    setTimeout(() => {
      iframe.src = "https://www.youtube.com/embed/" + videoId + 
                   "?autoplay=1&mute=1&playsinline=1&rel=0&controls=1";
      overlay.classList.add("visible");
    }, 80);
  };

  window.HideYoutubeVideo = function () {
    const overlay = document.getElementById("ending-video-overlay");
    const iframe = document.getElementById("ending-video-frame");

    if (iframe) iframe.src = ""; // 停止連線與聲音
    if (overlay) overlay.classList.remove("visible");
  };
</script>
</body>
</html>
