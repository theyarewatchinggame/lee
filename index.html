<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Unity WebGL Player | EggRoom</title>
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #000;
    font-family: Arial, sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px 0 20px;
    box-sizing: border-box;
    overflow: visible;
  }

  #unity-container {
    position: relative !important;
    /* 修正 1：將 100vw 改為 100%，避免捲軸寬度導致畫面無法置中 */
    width: min(calc(100% - 24px), calc((100vh - 32px) * 16 / 9));
    width: min(calc(100% - 24px), calc((100dvh - 32px) * 16 / 9));
    aspect-ratio: 16 / 9;
    height: auto !important;
    margin: auto; /* 確保上下左右皆由 flex 完美置中 */
    background: #000;
    overflow: hidden;
  }

  #unity-canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    background: #000;
    touch-action: manipulation;
  }

  #unity-loading-bar {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: min(80%, 400px);
    display: none;
  }

  #unity-warning {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    z-index: 30;
    width: calc(100% - 20px);
    max-width: 600px;
  }

  #unity-footer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 25;
  }

  #ending-video-overlay {
    position: absolute;
    left: 6%;
    top: 23%;
    width: 28%;
    height: 30%;
    z-index: 999999;
    display: none;
    opacity: 0;
    visibility: hidden;
    overflow: hidden;
    pointer-events: auto;
    transition: opacity 0.35s ease;
    background: transparent;
    border: 0;
    box-sizing: border-box;
  }

  #ending-video-overlay.visible {
    display: block !important;
    opacity: 1 !important;
    visibility: visible !important;
  }

  #ending-video-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  @media (max-width: 1024px) {
    html, body {
      overflow-y: auto !important;
      height: auto !important;
      display: block !important;
    }

    #stage {
      min-height: 100vh;
      min-height: 100dvh;
      /* 恢復原本的 padding 設定，給予畫面上下呼吸空間 */
      align-items: center;
      padding: 20px 0 28px !important; 
    }

    #unity-container,
    .unity-mobile {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      transform: none !important;

      /* 把寬度調小，例如改成 80% 或 85%，讓使用者可以上下滑動 */
      width: 80% !important;
      aspect-ratio: 16 / 9 !important;
      height: auto !important;

      margin: 0 auto !important;
      background: #000 !important;
      overflow: hidden !important;
    }

    #unity-canvas,
    canvas.unity-mobile {
      position: relative !important;
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    #unity-footer {
      display: none !important;
    }
  }
</style>
</head>

<body>
<div id="stage">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

    <div id="ending-video-overlay">
      <iframe
        id="ending-video-frame"
        src=""
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">000_13</div>
    </div>
  </div>
</div>

<script>
  const stage = document.querySelector("#stage");
  const container = document.querySelector("#unity-container");
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");
  const fullscreenButton = document.querySelector("#unity-fullscreen-button");
  const warningBanner = document.querySelector("#unity-warning");

  function unityShowBanner(msg, type) {
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? "block" : "none";
    }

    const div = document.createElement("div");
    div.innerHTML = msg;
    div.style.padding = "10px";
    div.style.marginBottom = "8px";
    div.style.borderRadius = "8px";
    div.style.textAlign = "center";
    div.style.fontSize = "14px";

    if (type === "error") {
      div.style.background = "red";
      div.style.color = "white";
    } else {
      div.style.background = "yellow";
      div.style.color = "black";
      setTimeout(() => {
        if (div.parentNode) {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }
      }, 5000);
    }

    warningBanner.appendChild(div);
    updateBannerVisibility();
  }

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/0427.loader.js";

  const config = {
    dataUrl: buildUrl + "/0427.data.unityweb",
    frameworkUrl: buildUrl + "/0427.framework.js.unityweb",
    codeUrl: buildUrl + "/0427.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "/0427",
    productVersion: "0.1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    /*container.className = "unity-mobile";
    canvas.className = "unity-mobile";*/
    config.devicePixelRatio = 1;
  }

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {
      loadingBar.style.display = "none";

      fullscreenButton.onclick = () => {
        if (stage.requestFullscreen) {
          stage.requestFullscreen();
        } else if (stage.webkitRequestFullscreen) {
          stage.webkitRequestFullscreen();
        }
      };

      setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
    }).catch((message) => {
      alert(message);
    });
  };

  script.onerror = () => {
    alert("loader 載入失敗，請確認 Build 檔名完全一致");
  };

  document.body.appendChild(script);

  window.ShowYoutubeVideo = function (videoId) {
    const overlay = document.getElementById("ending-video-overlay");
    const iframe = document.getElementById("ending-video-frame");

    if (!overlay || !iframe) return;

    iframe.src = "";
    setTimeout(() => {
      iframe.src =
        "https://www.youtube.com/embed/" +
        videoId +
        "?autoplay=1&mute=1&playsinline=1&rel=0&controls=1&modestbranding=1";

      overlay.classList.add("visible");
      overlay.style.display = "block";
    }, 80);
  };

  window.HideYoutubeVideo = function () {
    const overlay = document.getElementById("youtubeOverlay");
    const iframe = document.getElementById("youtubeFrame");

    if (iframe) iframe.src = "";
    if (overlay) {
      overlay.classList.remove("visible");
      overlay.style.display = "none";
    }
  };
</script>
</body>
</html>

</body>
</html>
